appId: com.gpu-monitor.ai
productName: GPU Monitor for AI Workloads
win:
  target:
    - target: nsis
      arch: x64
    - target: zip
      arch: x64
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: GPU Monitor for AI Workloads
  perMachine: true
  include: build/installer.nsh
linux:
  target:
    - target: AppImage
      arch: x64
    - target: tar.gz
      arch: x64
  icon: build/icon.svg
  category: Utility
  maintainer: riversde
  vendor: riversde
